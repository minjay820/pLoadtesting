name: CI

on:
  push:
    branches: [ main, 'chore/**', 'feat/**', 'fix/**' ]
  pull_request:
    branches: [ main ]

jobs:
  test-target-app:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f target-app/requirements.txt ]; then pip install -r target-app/requirements.txt; fi
        if [ -f target-app/requirements-dev.txt ]; then pip install -r target-app/requirements-dev.txt; fi

    - name: Run pytest
      run: |
        pytest target-app/
