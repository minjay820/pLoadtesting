# =============================================================================
# nebula-load-tester — Docker Compose
# =============================================================================
# Phase 1: target-app 服務已啟用。
# 其餘服務（control-plane、worker）保留為註解，待後續 Phase 逐步開啟。
# =============================================================================

version: "3.9"

services:
  # ---------------------------------------------------------------------------
  # target-app  ✅ Phase 1 — 已啟用
  # 壓測靶機：FastAPI + Uvicorn，提供 CPU/IO-bound 與資料回傳 API。
  # Host 存取：http://localhost:8000
  # Swagger UI：http://localhost:8000/docs
  # ---------------------------------------------------------------------------
  target-app:
    build:
      context: ./target-app
      dockerfile: Dockerfile
    container_name: nebula-target-app
    ports:
      - "8000:8000"
    networks:
      - nebula-net
    restart: unless-stopped
    # 健康檢查：與 Dockerfile HEALTHCHECK 一致，讓 depends_on 可等待就緒
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    # 資源限制：防止單一容器耗盡宿主機資源，確保壓測數據的隔離性
    deploy:
      resources:
        limits:
          cpus: "2.0"       # 最多使用 2 顆 vCPU
          memory: "512M"    # 最多使用 512 MB RAM
        reservations:
          cpus: "0.5"
          memory: "128M"
    environment:
      # 明確設定 Python unbuffered，確保 log 即時輸出
      - PYTHONUNBUFFERED=1

  # ---------------------------------------------------------------------------
  # Redis
  # 作為 Celery 的 Broker
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: nebula-redis
    ports:
      - "6379:6379"
    networks:
      - nebula-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # control-plane-web  🔜 Phase 4 (MVP)
  # Web 中控平台：任務調度、Worker 管理、報告彙整。
  # ---------------------------------------------------------------------------
  control-plane-web:
    build:
      context: ./control-plane
      dockerfile: Dockerfile
    container_name: nebula-control-plane-web
    command: python manage.py runserver 0.0.0.0:9000
    ports:
      - "9000:9000"
    networks:
      - nebula-net
    depends_on:
      redis:
        condition: service_healthy
      target-app:
        condition: service_healthy
    volumes:
      - ./control-plane:/app

  # ---------------------------------------------------------------------------
  # control-plane-celery  🔜 Phase 4 (MVP)
  # 處理非同步任務排程
  # ---------------------------------------------------------------------------
  control-plane-celery:
    build:
      context: ./control-plane
      dockerfile: Dockerfile
    container_name: nebula-control-plane-celery
    command: celery -A config worker --beat -l info
    networks:
      - nebula-net
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./control-plane:/app

  # ---------------------------------------------------------------------------
  # worker  🔜 Phase 3 — 尚未實作
  # 遠端 Worker Agent：執行壓測引擎，串流結果回中控台。
  # ---------------------------------------------------------------------------
  # worker:
  #   build: ./workers
  #   container_name: nebula-worker
  #   networks:
  #     - nebula-net
  #   depends_on:
  #     - control-plane-web

networks:
  nebula-net:
    driver: bridge

volumes:
  reports:
    # 未來用於儲存壓測報告的持久化 Volume

