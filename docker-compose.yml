# =============================================================================
# pLoadtesting — Docker Compose
# =============================================================================
# Phase 1: target-app service enabled.
# Other services (control-plane, worker) are currently placeholder setups.
# =============================================================================

version: "3.9"

services:
  # ---------------------------------------------------------------------------
  # target-app  ✅ Phase 1 — Enabled
  # Target app: FastAPI + Uvicorn, providing CPU/IO-bound and data return APIs.
  # Host access: http://localhost:8000
  # Swagger UI: http://localhost:8000/docs
  # ---------------------------------------------------------------------------
  target-app:
    build:
      context: ./target-app
      dockerfile: Dockerfile
    container_name: ploadtesting-target-app
    ports:
      - "8000:8000"
    networks:
      - ploadtesting-net
    restart: unless-stopped
    # Health check: aligns with Dockerfile HEALTHCHECK, allowing depends_on to wait
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    # Resource limits: prevent container from exhausting host resources
    deploy:
      resources:
        limits:
          cpus: "2.0"       # max 2 vCPUs
          memory: "512M"    # max 512 MB RAM
        reservations:
          cpus: "0.5"
          memory: "128M"
    environment:
      # Ensure Python unbuffered log output
      - PYTHONUNBUFFERED=1

  # ---------------------------------------------------------------------------
  # Redis
  # Broker for Celery tasks
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: ploadtesting-redis
    ports:
      - "6379:6379"
    networks:
      - ploadtesting-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # control-plane-web  🔜 Phase 4 (MVP)
  # Web Control Plane: task scheduling, worker management, report aggregation.
  # ---------------------------------------------------------------------------
  control-plane-web:
    build:
      context: ./control-plane
      dockerfile: Dockerfile
    container_name: ploadtesting-control-plane-web
    command: python manage.py runserver 0.0.0.0:9000
    ports:
      - "9000:9000"
    networks:
      - ploadtesting-net
    depends_on:
      redis:
        condition: service_healthy
      target-app:
        condition: service_healthy
    volumes:
      - ./control-plane:/app

  # ---------------------------------------------------------------------------
  # control-plane-celery  🔜 Phase 4 (MVP)
  # Background task scheduler
  # ---------------------------------------------------------------------------
  control-plane-celery:
    build:
      context: ./control-plane
      dockerfile: Dockerfile
    container_name: ploadtesting-control-plane-celery
    command: celery -A config worker --beat -l info
    networks:
      - ploadtesting-net
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./control-plane:/app

  # ---------------------------------------------------------------------------
  # worker  🔜 Phase 3 (MVP)
  # Remote Worker Agent: registers with Control Plane and sends heartbeats.
  # ---------------------------------------------------------------------------
  worker-agent-1:
    build:
      context: ./workers
      dockerfile: Dockerfile
    container_name: ploadtesting-worker-agent-1
    networks:
      - ploadtesting-net
    depends_on:
      control-plane-web:
        condition: service_started
    environment:
      - CONTROL_PLANE_URL=http://control-plane-web:9000
      - WORKER_NAME=worker-agent-1
    volumes:
      - ./engines:/app/engines

networks:
  ploadtesting-net:
    driver: bridge

volumes:
  reports:
    # Future volume for storing load testing reports

